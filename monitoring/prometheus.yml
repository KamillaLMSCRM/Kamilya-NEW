# Kamilya LMS — Prometheus Configuration
# Add to Prometheus config or docker-compose

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # FastAPI metrics
  - job_name: 'kamilya-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # PostgreSQL metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Node exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

# Alert rules
rule_files:
  - 'alert_rules.yml'

# Alert manager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
