<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <link rel="icon" href="data:,">
  <title>Kamilya LMS — путь от документа до подтвержденного обучения</title>
  <style>
    :root {
      --bg: #f2f3f7;
      --surface: #ffffff;
      --surface-2: #f8f8fa;
      --ink: #17181c;
      --muted: #686b74;
      --line: #e2e3e8;
      --blue: #2864e8;
      --blue-2: #174bc4;
      --blue-soft: #eaf0ff;
      --gold: #b88721;
      --green: #168653;
      --green-soft: #e8f7ef;
      --amber: #b56b05;
      --amber-soft: #fff4dc;
      --red: #c74242;
      --shadow: 0 22px 70px rgba(22, 27, 39, .15);
      --ui-shadow: 0 7px 24px rgba(21, 24, 32, .07);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: rgba(40, 100, 232, .16);
      color: var(--ink);
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
    }
    button, input, select { font: inherit; }
    button { letter-spacing: 0; }
    button:focus-visible { outline: 3px solid rgba(40, 100, 232, .32); outline-offset: 3px; }

    .deck {
      position: relative;
      display: grid;
      place-items: center;
      width: 100vw;
      height: 100vh;
      padding: 18px;
      background:
        linear-gradient(135deg, rgba(40, 100, 232, .08), transparent 40%),
        linear-gradient(315deg, rgba(184, 135, 33, .08), transparent 38%),
        #edf0f5;
    }

    .stage-wrap {
      position: relative;
      width: min(calc(100vw - 36px), calc((100vh - 36px) * 16 / 9));
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border: 1px solid rgba(23, 24, 28, .12);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: #fafafa;
    }

    .scene {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: translateX(22px) scale(.995);
      pointer-events: none;
      transition: opacity .34s ease, transform .34s ease;
    }
    .scene.active { opacity: 1; transform: none; pointer-events: auto; }
    .scene.leaving { opacity: 0; transform: translateX(-22px) scale(.995); }
    .scene-frame {
      width: 1280px;
      height: 720px;
      transform: scale(var(--scene-scale, 1));
      transform-origin: top left;
    }

    .app-shell { display: grid; grid-template-columns: 236px minmax(0, 1fr); height: 100%; background: #fbfbfc; }
    .sidebar { display: flex; flex-direction: column; min-width: 0; border-right: 1px solid var(--line); background: #fff; }
    .brand { height: 68px; display: flex; align-items: center; gap: 10px; padding: 0 18px; border-bottom: 1px solid var(--line); }
    .brand-mark { display: grid; place-items: center; width: 38px; height: 38px; border-radius: 8px; color: #fff; font-size: 22px; font-weight: 700; background: linear-gradient(135deg, #c39a3d, #2864e8); box-shadow: 0 5px 12px rgba(40, 100, 232, .18); }
    .brand-word { font-size: 21px; line-height: 1; white-space: nowrap; }
    .brand-word b { color: #ad8231; font-weight: 650; }
    .brand-word span { color: #3970da; }
    .brand small { display: block; margin-top: 5px; color: #8a8175; font-size: 9px; font-weight: 600; }
    .side-scroll { flex: 1; overflow: hidden; padding: 16px 12px; }
    .side-label { margin: 12px 10px 7px; color: #8b8c94; font-size: 9px; font-weight: 700; text-transform: uppercase; }
    .nav-item { display: flex; align-items: center; gap: 10px; height: 38px; margin: 2px 0; padding: 0 12px; border-radius: 9px; color: #666872; font-size: 12px; white-space: nowrap; }
    .nav-item .ico { width: 18px; color: currentColor; font-size: 15px; text-align: center; }
    .nav-item.active { position: relative; color: var(--blue); background: var(--blue-soft); font-weight: 650; }
    .nav-item.active::before { content: ""; position: absolute; left: -12px; top: 9px; width: 3px; height: 20px; border-radius: 0 3px 3px 0; background: var(--blue); }
    .person { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-top: 1px solid var(--line); }
    .avatar { display: grid; place-items: center; width: 32px; height: 32px; flex: 0 0 auto; border-radius: 50%; color: var(--blue); background: #edf2ff; font-size: 12px; font-weight: 700; }
    .person b { display: block; font-size: 11px; }
    .person small { color: var(--muted); font-size: 9px; }

    .app-main { display: grid; grid-template-rows: 68px minmax(0, 1fr); min-width: 0; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 20px; padding: 0 24px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,.96); }
    .tenant { color: #777982; font-size: 11px; }
    .tenant b { color: #373940; font-weight: 600; }
    .top-actions { display: flex; align-items: center; gap: 9px; }
    .top-pill { display: flex; align-items: center; justify-content: center; height: 34px; padding: 0 13px; border: 1px solid var(--line); border-radius: 9px; color: #555861; background: #fff; font-size: 11px; }
    .top-avatar { display: grid; place-items: center; width: 35px; height: 35px; border-radius: 50%; color: var(--blue); background: #eaf0ff; font-size: 11px; font-weight: 700; }
    .content { position: relative; min-width: 0; overflow: hidden; padding: 28px 32px; background: #fbfbfc; }
    .content.compact { padding: 20px 24px; }
    .page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; margin-bottom: 20px; }
    .page-head h1 { margin: 0 0 7px; font-size: 25px; line-height: 1.15; font-weight: 700; }
    h1, h2, h3 { text-wrap: balance; }
    .page-head p { max-width: 720px; margin: 0; color: var(--muted); font-size: 11px; line-height: 1.55; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; min-height: 36px; padding: 0 15px; border: 1px solid var(--line); border-radius: 8px; color: #33353b; background: #fff; font-size: 11px; font-weight: 600; }
    .btn.primary { color: #fff; border-color: var(--blue); background: var(--blue); }
    .btn.success { color: #fff; border-color: var(--green); background: var(--green); }
    .btn.soft { color: var(--blue); border-color: #cddaff; background: #eef3ff; }
    .btn.danger { color: #fff; border-color: var(--red); background: var(--red); }
    .btn.large { min-height: 43px; padding: 0 20px; font-size: 12px; }
    .btn[disabled] { opacity: .46; }
    .card { border: 1px solid var(--line); border-radius: 10px; background: #fff; box-shadow: var(--ui-shadow); }
    .card-pad { padding: 18px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .metric { padding: 16px; }
    .metric strong { display: block; margin-bottom: 5px; font-size: 24px; line-height: 1; }
    .metric span { color: var(--muted); font-size: 10px; }
    .metric.blue strong { color: var(--blue); }
    .metric.green strong { color: var(--green); }
    .metric.gold strong { color: var(--gold); }
    .field label { display: block; margin: 0 0 6px; color: #4c4e55; font-size: 10px; font-weight: 600; }
    .input, .select, .textarea { display: flex; align-items: center; width: 100%; min-height: 38px; padding: 9px 12px; border: 1px solid var(--line); border-radius: 8px; color: #34363d; background: #fff; font-size: 11px; }
    .textarea { align-items: flex-start; min-height: 74px; line-height: 1.5; }
    .section-title { margin: 0 0 12px; font-size: 14px; }
    .muted { color: var(--muted); }
    .small { font-size: 10px; }
    .badge { display: inline-flex; align-items: center; justify-content: center; min-height: 22px; padding: 0 9px; border-radius: 999px; color: var(--blue); background: var(--blue-soft); font-size: 9px; font-weight: 700; }
    .badge.green { color: var(--green); background: var(--green-soft); }
    .badge.amber { color: var(--amber); background: var(--amber-soft); }
    .row { display: flex; align-items: center; gap: 10px; }
    .between { justify-content: space-between; }
    .divider { height: 1px; background: var(--line); }

    .stepper { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
    .step { display: flex; align-items: center; gap: 8px; color: #99959a; font-size: 11px; }
    .step::after { content: ""; height: 1px; flex: 1; background: var(--line); }
    .step:last-child::after { display: none; }
    .step-num { display: grid; place-items: center; width: 27px; height: 27px; border-radius: 50%; color: #777; background: #f4f4f6; font-weight: 700; }
    .step.active { color: #2d2f35; font-weight: 650; }
    .step.active .step-num { color: #fff; background: var(--blue); }
    .step.done .step-num { color: #fff; background: var(--green); }

    .upload { display: grid; place-items: center; min-height: 165px; padding: 20px; border: 1.5px dashed #cfd1d8; border-radius: 11px; background: #fcfcfd; text-align: center; }
    .upload-icon { display: grid; place-items: center; width: 52px; height: 42px; margin-bottom: 10px; color: #7f818a; border: 2px solid #a8aab2; border-radius: 7px; font-size: 18px; }
    .upload b { display: block; font-size: 12px; }
    .upload span { display: block; margin-top: 5px; color: var(--muted); font-size: 10px; }
    .file-row { display: grid; grid-template-columns: 36px minmax(0,1fr) auto; gap: 11px; align-items: center; padding: 12px 14px; border: 1px solid var(--line); border-radius: 9px; background: #fff; }
    .file-icon { display: grid; place-items: center; width: 34px; height: 34px; border-radius: 7px; color: var(--blue); background: var(--blue-soft); font-size: 16px; }
    .file-row b { display: block; font-size: 11px; }
    .file-row small { color: var(--muted); font-size: 9px; }

    .pipeline { display: grid; gap: 12px; max-width: 760px; margin: 30px auto 0; }
    .pipeline-row { display: grid; grid-template-columns: 36px minmax(0,1fr) auto; gap: 12px; align-items: center; padding: 14px 16px; border: 1px solid var(--line); border-radius: 10px; background: #fff; }
    .pipeline-row .tick { display: grid; place-items: center; width: 30px; height: 30px; border-radius: 50%; color: #fff; background: var(--green); font-weight: 800; }
    .pipeline-row.running .tick { color: var(--blue); background: var(--blue-soft); }
    .pipeline-row b { display: block; font-size: 11px; }
    .pipeline-row small { color: var(--muted); font-size: 9px; }
    .progress { height: 7px; overflow: hidden; border-radius: 99px; background: #eceef3; }
    .progress > span { display: block; width: var(--value, 0%); height: 100%; border-radius: inherit; background: var(--blue); }
    .spinner { width: 17px; height: 17px; border: 2px solid #cad7fa; border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .course-layout { display: grid; grid-template-columns: 290px minmax(0, 1fr); gap: 14px; height: calc(100% - 73px); }
    .outline { overflow: hidden; }
    .outline-head { padding: 14px 15px; border-bottom: 1px solid var(--line); font-size: 12px; font-weight: 700; }
    .module { padding: 12px 13px; border-bottom: 1px solid var(--line); }
    .module > b { display: block; margin-bottom: 8px; color: #676a73; font-size: 9px; text-transform: uppercase; }
    .lesson-item { padding: 8px 9px; border-radius: 7px; color: #555861; font-size: 10px; }
    .lesson-item.active { color: var(--blue); background: var(--blue-soft); font-weight: 650; }
    .editor { display: grid; grid-template-rows: auto minmax(0,1fr); min-width: 0; overflow: hidden; }
    .editor-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 17px; border-bottom: 1px solid var(--line); }
    .editor-head b { font-size: 12px; }
    .editor-body { overflow: hidden; padding: 18px; }
    .richtext { min-height: 285px; padding: 17px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .richtext h2 { margin: 0 0 12px; font-size: 18px; }
    .richtext p { margin: 0 0 10px; color: #50535b; font-size: 10px; line-height: 1.6; }
    .richtext ul { margin: 8px 0; padding-left: 17px; color: #50535b; font-size: 10px; line-height: 1.6; }
    .toolbar { display: flex; gap: 5px; margin-bottom: 9px; }
    .tool { display: grid; place-items: center; width: 28px; height: 27px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: #5a5d65; font-size: 10px; font-weight: 700; }

    .quiz-layout { display: grid; grid-template-columns: 310px minmax(0,1fr); gap: 14px; height: calc(100% - 75px); }
    .quiz-list { padding: 13px; overflow: hidden; }
    .quiz-list h3 { margin: 0 0 11px; font-size: 13px; }
    .quiz-tree { padding: 10px; border: 1px solid var(--line); border-radius: 8px; }
    .quiz-tree b { display: block; margin-bottom: 8px; font-size: 10px; }
    .quiz-node { padding: 8px; border-radius: 6px; font-size: 10px; }
    .quiz-node.active { color: var(--blue); background: var(--blue-soft); }
    .question { margin-bottom: 10px; padding: 14px; border: 1px solid var(--line); border-radius: 9px; background: #fff; }
    .question h4 { margin: 0 0 11px; font-size: 11px; }
    .answer { display: flex; align-items: center; gap: 7px; margin: 7px 0; color: #6a6c74; font-size: 9px; }
    .answer.correct { color: var(--green); font-weight: 650; }
    .radio { width: 13px; height: 13px; border: 1px solid currentColor; border-radius: 50%; }
    .answer.correct .radio { border: 4px solid var(--green); }

    .checklist { display: grid; gap: 9px; margin-top: 14px; }
    .check { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border: 1px solid var(--line); border-radius: 8px; background: #fff; font-size: 10px; }
    .check i { display: grid; place-items: center; width: 20px; height: 20px; border-radius: 50%; color: #fff; background: var(--green); font-style: normal; font-weight: 800; }

    .table { width: 100%; overflow: hidden; border: 1px solid var(--line); border-radius: 9px; background: #fff; }
    .tr { display: grid; grid-template-columns: 1.35fr 1fr 1fr .9fr .8fr; align-items: center; min-height: 46px; padding: 0 14px; border-top: 1px solid var(--line); font-size: 10px; }
    .tr:first-child { border-top: 0; }
    .tr.head { min-height: 39px; color: #747780; background: #f8f8fa; font-size: 9px; font-weight: 700; text-transform: uppercase; }
    .check-box { width: 15px; height: 15px; border: 1px solid #babcc3; border-radius: 4px; }
    .check-box.on { display: grid; place-items: center; color: #fff; border-color: var(--blue); background: var(--blue); font-size: 9px; }
    .student-card { display: grid; grid-template-columns: 1fr 190px; gap: 18px; padding: 18px; }
    .course-hero { min-height: 120px; padding: 20px; border-radius: 10px; color: #fff; background: linear-gradient(120deg, #173f9b, #2872e4 62%, #4c9ed5); }
    .course-hero .kicker { color: rgba(255,255,255,.72); font-size: 9px; text-transform: uppercase; }
    .course-hero h2 { max-width: 560px; margin: 9px 0 8px; font-size: 21px; line-height: 1.18; }
    .course-hero p { max-width: 620px; margin: 0; color: rgba(255,255,255,.84); font-size: 10px; line-height: 1.5; }
    .lesson-list { margin-top: 14px; }
    .student-lesson { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 11px 12px; border-top: 1px solid var(--line); font-size: 10px; }
    .student-lesson:first-child { border-top: 0; }
    .done-dot { display: grid; place-items: center; width: 19px; height: 19px; border-radius: 50%; color: #fff; background: var(--green); font-size: 10px; }

    .certificate { position: relative; width: 68%; margin: 8px auto; aspect-ratio: 1.55; padding: 24px; overflow: hidden; border: 8px solid #f1e6c9; outline: 1px solid #cfae62; background: #fffdf7; text-align: center; }
    .certificate::before, .certificate::after { content: ""; position: absolute; width: 90px; height: 90px; border-radius: 50%; background: rgba(40,100,232,.05); }
    .certificate::before { left: -35px; top: -35px; }
    .certificate::after { right: -35px; bottom: -35px; }
    .cert-brand { color: var(--gold); font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    .certificate h2 { margin: 12px 0 4px; font-family: Georgia, serif; font-size: 27px; font-weight: 500; }
    .certificate p { margin: 6px 0; color: #646058; font-size: 10px; }
    .certificate h3 { margin: 9px 0 6px; font-family: Georgia, serif; font-size: 18px; }
    .cert-number { display: inline-flex; margin-top: 11px; padding: 7px 13px; border: 1px solid #d9c28e; border-radius: 99px; color: #7d622b; font-size: 9px; }

    .callout {
      position: absolute;
      z-index: 20;
      width: min(340px, 33%);
      padding: 17px 18px 16px;
      border: 1px solid rgba(23, 24, 28, .12);
      border-radius: 11px;
      color: #fff;
      background: rgba(19, 24, 36, .94);
      box-shadow: 0 18px 45px rgba(15, 20, 31, .28);
      backdrop-filter: blur(12px);
    }
    .callout.top-right { top: 88px; right: 24px; }
    .callout.bottom-right { right: 24px; bottom: 62px; }
    .callout.bottom-left { left: 260px; bottom: 62px; }
    .callout.top-left { top: 88px; left: 260px; }
    .callout.cert { top: 90px; right: 18px; width: 300px; }
    .callout .eyebrow { color: #9fb9ff; font-size: 9px; font-weight: 750; text-transform: uppercase; }
    .callout h2 { margin: 7px 0 7px; font-size: 17px; line-height: 1.2; }
    .callout p { margin: 0; color: rgba(255,255,255,.78); font-size: 10px; line-height: 1.55; }
    .callout .benefit { display: flex; gap: 8px; align-items: flex-start; margin-top: 11px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,.13); color: #fff; font-size: 9px; line-height: 1.45; }
    .callout .benefit::before { content: "Результат"; flex: 0 0 auto; padding: 3px 6px; border-radius: 99px; color: #b7f3d1; background: rgba(22,134,83,.23); font-size: 8px; font-weight: 750; text-transform: uppercase; }
    .focus-ring { position: absolute; z-index: 15; border: 3px solid #6d96ff; border-radius: 11px; box-shadow: 0 0 0 999px rgba(9, 13, 23, .36), 0 0 0 5px rgba(109,150,255,.20); pointer-events: none; animation: focusPulse 2.1s ease-in-out infinite; }
    @keyframes focusPulse { 50% { box-shadow: 0 0 0 999px rgba(9,13,23,.36), 0 0 0 9px rgba(109,150,255,.10); } }

    .intro, .outro { position: relative; display: grid; height: 100%; overflow: hidden; padding: 68px; color: #fff; background: #111826; }
    .intro { grid-template-columns: 1.1fr .9fr; gap: 62px; align-items: center; }
    .intro::after, .outro::after { content: ""; position: absolute; inset: auto -12% -35% 38%; height: 78%; border-radius: 50%; background: radial-gradient(circle, rgba(40,100,232,.38), transparent 68%); pointer-events: none; }
    .intro-brand { display: flex; align-items: center; gap: 13px; margin-bottom: 42px; }
    .intro-brand .brand-mark { width: 48px; height: 48px; font-size: 28px; }
    .intro-brand .brand-word { color: #fff; font-size: 28px; }
    .intro h1 { max-width: 760px; margin: 0; font-size: 52px; line-height: 1.03; }
    .intro h1 span { color: #79a0ff; }
    .intro .lead { max-width: 680px; margin: 20px 0 0; color: rgba(255,255,255,.66); font-size: 16px; line-height: 1.55; }
    .story-map { position: relative; z-index: 1; padding: 27px; border: 1px solid rgba(255,255,255,.12); border-radius: 16px; background: rgba(255,255,255,.055); }
    .story-map h2 { margin: 0 0 19px; font-size: 14px; color: rgba(255,255,255,.72); }
    .story-step { display: grid; grid-template-columns: 32px minmax(0,1fr); gap: 12px; align-items: center; min-height: 54px; border-top: 1px solid rgba(255,255,255,.08); }
    .story-step:first-of-type { border-top: 0; }
    .story-step span { display: grid; place-items: center; width: 28px; height: 28px; border-radius: 8px; color: #9db8ff; background: rgba(83,124,230,.18); font-size: 11px; font-weight: 750; }
    .story-step b { display: block; font-size: 12px; }
    .story-step small { display: block; margin-top: 3px; color: rgba(255,255,255,.51); font-size: 9px; }
    .outro { grid-template-columns: 1fr; align-content: center; }
    .outro-inner { position: relative; z-index: 1; max-width: 1040px; }
    .outro h1 { max-width: 930px; margin: 0; font-size: 49px; line-height: 1.04; }
    .outro h1 span { color: #7fa4ff; }
    .outro .lead { max-width: 760px; margin: 18px 0 28px; color: rgba(255,255,255,.65); font-size: 15px; line-height: 1.55; }
    .outcome-flow { display: flex; flex-wrap: wrap; gap: 8px; }
    .outcome-flow span { padding: 10px 13px; border: 1px solid rgba(255,255,255,.14); border-radius: 8px; background: rgba(255,255,255,.06); font-size: 11px; font-weight: 650; }
    .outcome-flow i { align-self: center; color: #7597e8; font-style: normal; }
    .truth-note { max-width: 850px; margin-top: 28px; padding: 13px 15px; border-left: 3px solid #d8b76e; color: rgba(255,255,255,.58); background: rgba(216,183,110,.08); font-size: 9px; line-height: 1.55; }

    .deck-controls { position: absolute; z-index: 80; left: 50%; bottom: 16px; display: flex; align-items: center; gap: 8px; transform: translateX(-50%); transition: opacity .25s ease, transform .25s ease; }
    .control { display: grid; place-items: center; min-width: 38px; height: 38px; padding: 0 12px; border: 1px solid rgba(255,255,255,.2); border-radius: 9px; color: #fff; background: rgba(16,21,31,.82); box-shadow: 0 8px 25px rgba(0,0,0,.25); backdrop-filter: blur(12px); font-size: 11px; }
    .control:hover { background: rgba(31,39,56,.95); }
    .control.primary { background: var(--blue); border-color: var(--blue); }
    .counter { min-width: 66px; color: rgba(255,255,255,.82); font-variant-numeric: tabular-nums; }
    .timeline { position: absolute; z-index: 75; left: 0; right: 0; bottom: 0; height: 4px; background: rgba(17,24,38,.12); }
    .timeline span { display: block; height: 100%; width: 0; background: var(--blue); transition: width .25s ease; }
    .chapter { position: absolute; z-index: 70; left: 18px; top: 16px; display: flex; gap: 8px; align-items: center; padding: 8px 10px; border: 1px solid rgba(255,255,255,.17); border-radius: 8px; color: #fff; background: rgba(16,21,31,.74); backdrop-filter: blur(12px); font-size: 9px; font-weight: 650; }
    .chapter span { color: #a9bfff; }
    .hint { position: absolute; z-index: 70; right: 18px; top: 16px; padding: 8px 10px; border: 1px solid rgba(255,255,255,.17); border-radius: 8px; color: rgba(255,255,255,.72); background: rgba(16,21,31,.74); backdrop-filter: blur(12px); font-size: 9px; }

    .overview { position: absolute; z-index: 100; inset: 0; display: none; padding: 30px; overflow: auto; color: #fff; background: rgba(13,18,28,.97); }
    .overview { overscroll-behavior: contain; }
    .overview.open { display: block; }
    .overview-head { display: flex; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 20px; }
    .overview h2 { margin: 0; font-size: 24px; }
    .overview-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; }
    .overview-card { padding: 14px; border: 1px solid rgba(255,255,255,.13); border-radius: 10px; color: #fff; background: rgba(255,255,255,.05); text-align: left; }
    .overview-card.active { border-color: #779cfa; background: rgba(40,100,232,.18); }
    .overview-card span { color: #9fb9ff; font-size: 9px; font-weight: 750; }
    .overview-card b { display: block; margin-top: 7px; font-size: 11px; line-height: 1.35; }
    .mobile-caption { display: none; }

    .clean .deck-controls, .clean .chapter, .clean .hint { opacity: 0; pointer-events: none; transform: translate(-50%, 8px); }
    .clean .chapter, .clean .hint { transform: translateY(-8px); }
    .clean:hover .deck-controls, .clean:hover .chapter, .clean:hover .hint { opacity: 1; pointer-events: auto; }
    .clean:hover .deck-controls { transform: translateX(-50%); }
    .clean:hover .chapter, .clean:hover .hint { transform: none; }
    .recording { cursor: none; }
    .recording .deck-controls, .recording .chapter, .recording .hint {
      opacity: 0 !important;
      pointer-events: none !important;
    }

    .sales-frame {
      display: grid;
      grid-template-rows: 590px 130px;
      width: 1280px;
      height: 720px;
      background: #f7f8fb;
    }
    .sales-visual { position: relative; min-height: 0; overflow: hidden; }
    .sales-narrative {
      position: relative;
      z-index: 30;
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr) 330px;
      gap: 24px;
      align-items: center;
      padding: 20px 34px;
      color: #fff;
      border-top: 1px solid rgba(255,255,255,.12);
      background: #131b2b;
    }
    .sales-step { color: #91adf5; font-size: 10px; font-weight: 750; text-transform: uppercase; }
    .sales-step b { display: block; margin-top: 7px; color: #fff; font-size: 13px; text-transform: none; }
    .sales-message h2 { margin: 0 0 7px; font-size: 20px; line-height: 1.16; }
    .sales-message p { margin: 0; color: rgba(255,255,255,.67); font-size: 11px; line-height: 1.5; }
    .sales-result { padding-left: 20px; border-left: 1px solid rgba(255,255,255,.14); }
    .sales-result span { color: #91d9b5; font-size: 9px; font-weight: 750; text-transform: uppercase; }
    .sales-result p { margin: 7px 0 0; color: rgba(255,255,255,.88); font-size: 11px; line-height: 1.45; }
    .sales-frame .app-shell { grid-template-columns: 76px minmax(0, 1fr); height: 590px; }
    .sales-frame .brand { justify-content: center; padding: 0; }
    .sales-frame .brand-word, .sales-frame .brand small, .sales-frame .side-label,
    .sales-frame .nav-item span:not(.ico), .sales-frame .person > div:last-child { display: none; }
    .sales-frame .side-scroll { padding: 14px 10px; }
    .sales-frame .nav-item { justify-content: center; padding: 0; }
    .sales-frame .nav-item.active::before { left: -10px; }
    .sales-frame .person { justify-content: center; padding: 12px 0; }
    .sales-frame .app-main { grid-template-rows: 58px minmax(0,1fr); }
    .sales-frame .topbar { padding: 0 22px; }
    .sales-frame .content { padding: 22px 28px; }
    .sales-frame .page-head { margin-bottom: 15px; }
    .sales-frame .page-head h1 { font-size: 22px; }
    .sales-frame .focus-ring { box-shadow: 0 0 0 999px rgba(9,13,23,.22), 0 0 0 5px rgba(109,150,255,.18); }

    .pain-screen, .pilot-screen, .transform-screen {
      position: relative;
      height: 590px;
      overflow: hidden;
      padding: 54px 64px;
      background: #111826;
      color: #fff;
    }
    .pain-screen::after, .pilot-screen::after, .transform-screen::after {
      content: "";
      position: absolute;
      right: -130px;
      bottom: -250px;
      width: 720px;
      height: 720px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(40,100,232,.34), transparent 68%);
    }
    .sales-kicker { position: relative; z-index: 1; color: #87a8fb; font-size: 11px; font-weight: 750; text-transform: uppercase; }
    .pain-screen h1, .pilot-screen h1 { position: relative; z-index: 1; max-width: 850px; margin: 18px 0 14px; font-size: 43px; line-height: 1.04; }
    .pain-screen .lead, .pilot-screen .lead { position: relative; z-index: 1; max-width: 760px; margin: 0; color: rgba(255,255,255,.65); font-size: 15px; line-height: 1.55; }
    .pain-grid { position: relative; z-index: 1; display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; margin-top: 34px; }
    .pain-card { min-height: 128px; padding: 19px; border: 1px solid rgba(255,255,255,.12); border-radius: 10px; background: rgba(255,255,255,.055); }
    .pain-card span { display: grid; place-items: center; width: 30px; height: 30px; margin-bottom: 13px; border-radius: 8px; color: #a9beef; background: rgba(74,112,202,.19); font-size: 12px; font-weight: 750; }
    .pain-card b { display: block; font-size: 13px; }
    .pain-card p { margin: 7px 0 0; color: rgba(255,255,255,.55); font-size: 10px; line-height: 1.5; }

    .sales-source-grid { display: grid; grid-template-columns: .8fr 1.2fr; gap: 14px; }
    .sales-source-grid .upload { min-height: 196px; }
    .sales-source-grid .card { min-height: 258px; }
    .transform-screen { padding: 45px 56px; background: #f5f7fb; color: var(--ink); }
    .transform-screen::after { opacity: .5; }
    .transform-screen .sales-kicker { color: var(--blue); }
    .transform-screen h1 { position: relative; z-index: 1; max-width: 820px; margin: 13px 0 8px; font-size: 32px; line-height: 1.08; }
    .transform-screen > p { position: relative; z-index: 1; margin: 0; color: var(--muted); font-size: 12px; }
    .transform-flow { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 42px 1fr 42px 1fr; gap: 10px; align-items: stretch; margin-top: 27px; }
    .transform-arrow { display: grid; place-items: center; color: var(--blue); font-size: 24px; font-weight: 750; }
    .transform-card { min-height: 268px; padding: 20px; border: 1px solid var(--line); border-radius: 11px; background: #fff; box-shadow: var(--ui-shadow); }
    .transform-card .num { display: grid; place-items: center; width: 28px; height: 28px; margin-bottom: 15px; border-radius: 8px; color: var(--blue); background: var(--blue-soft); font-size: 10px; font-weight: 750; }
    .transform-card h3 { margin: 0 0 6px; font-size: 15px; }
    .transform-card > p { margin: 0 0 16px; color: var(--muted); font-size: 10px; line-height: 1.5; }
    .doc-lines { display: grid; gap: 7px; padding: 13px; border: 1px solid var(--line); border-radius: 8px; }
    .doc-lines i { display: block; height: 6px; border-radius: 99px; background: #e7e9ef; }
    .doc-lines i:nth-child(2) { width: 85%; }
    .doc-lines i:nth-child(3) { width: 72%; background: #cad8fa; }
    .structure-mini { display: grid; gap: 8px; }
    .structure-mini div { padding: 9px 10px; border-radius: 7px; color: #4f535d; background: #f4f6fa; font-size: 9px; }
    .structure-mini div:first-child { color: var(--blue); background: var(--blue-soft); font-weight: 700; }
    .test-mini { padding: 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 9px; }
    .test-mini b { display: block; margin-bottom: 9px; font-size: 10px; }
    .test-mini span { display: block; margin-top: 6px; color: var(--muted); }
    .test-mini .right { color: var(--green); font-weight: 700; }

    .method-grid { display: grid; grid-template-columns: 230px minmax(0,1fr) 300px; gap: 12px; height: 385px; }
    .method-grid .richtext { min-height: 280px; }
    .method-grid .question { margin: 0; height: 100%; }
    .publish-grid { display: grid; grid-template-columns: .9fr 1.1fr; gap: 14px; }
    .publish-grid .card { min-height: 342px; }
    .publish-grid .table .tr { min-height: 41px; }
    .learner-grid { display: grid; grid-template-columns: 1.15fr .85fr; gap: 14px; }
    .learner-grid .course-hero { min-height: 110px; }
    .result-grid { display: grid; grid-template-columns: 1.3fr .7fr; gap: 14px; }
    .result-grid .certificate { width: 100%; margin: 0; aspect-ratio: auto; height: 350px; padding: 18px; }
    .result-grid .certificate h2 { font-size: 22px; }
    .result-grid .certificate h3 { font-size: 14px; }
    .result-grid .tr { grid-template-columns: 1.3fr .9fr .8fr .8fr; }
    .result-grid .tr.head { grid-template-columns: 1.3fr .9fr .8fr .8fr; }
    .pilot-grid { position: relative; z-index: 1; display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-top: 29px; }
    .pilot-step { min-height: 110px; padding: 16px; border: 1px solid rgba(255,255,255,.12); border-radius: 10px; background: rgba(255,255,255,.055); }
    .pilot-step span { color: #86a7f8; font-size: 10px; font-weight: 750; }
    .pilot-step b { display: block; margin-top: 10px; font-size: 12px; line-height: 1.35; }
    .pilot-cta { position: relative; z-index: 1; display: inline-flex; margin-top: 23px; padding: 12px 17px; border-radius: 8px; color: #fff; background: var(--blue); font-size: 12px; font-weight: 700; }

    @media (max-width: 900px) {
      .deck { padding: 0; place-items: start center; overflow-y: auto; }
      .stage-wrap { width: 100vw; margin-top: calc((100vh - 56.25vw) / 2); overflow: visible; border-radius: 0; border-left: 0; border-right: 0; }
      .stage { border-radius: 0; }
      .callout { width: 38%; padding: 12px; }
      .callout h2 { font-size: 13px; }
      .callout p { font-size: 8px; }
      .callout .benefit { display: none; }
      .overview-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }

    @media (max-width: 560px) {
      html, body { min-height: 100%; height: auto; }
      body { overflow-x: hidden; overflow-y: auto; }
      .deck {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        width: 100%;
        min-height: 100dvh;
        height: auto;
        padding: 0 0 calc(24px + env(safe-area-inset-bottom));
        overflow: visible;
      }
      .stage-wrap {
        flex: 0 0 auto;
        margin-top: calc(52px + env(safe-area-inset-top));
      }
      .sales-mode .stage-wrap { aspect-ratio: 1280 / 590; }
      .deck-controls { bottom: -54px; }
      .control { height: 36px; color: #fff; }
      .chapter { left: 8px; top: -44px; color: #fff; background: #151c2a; }
      .hint { display: none; }
      .full-mode .callout { display: none; }
      .callout { left: 5% !important; right: auto !important; bottom: 10px !important; top: auto !important; width: 90%; padding: 9px 11px; }
      .callout .eyebrow, .callout p { display: none; }
      .callout h2 { margin: 0; font-size: 11px; }
      .focus-ring { box-shadow: 0 0 0 999px rgba(9,13,23,.18), 0 0 0 4px rgba(109,150,255,.18); }
      .overview {
        position: fixed;
        inset: 0;
        z-index: 200;
        width: 100vw;
        height: 100dvh;
        padding: calc(18px + env(safe-area-inset-top)) 18px calc(18px + env(safe-area-inset-bottom));
        border-radius: 0;
        background: #111826;
      }
      .overview-grid { grid-template-columns: 1fr; }
      .mobile-caption {
        display: block;
        flex: 0 0 auto;
        width: calc(100vw - 32px);
        margin-top: 72px;
        margin-bottom: 0;
        padding: 17px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: #fff;
        box-shadow: var(--ui-shadow);
      }
      .mobile-caption span { color: var(--blue); font-size: 10px; font-weight: 750; text-transform: uppercase; }
      .mobile-caption h2 { margin: 7px 0 8px; font-size: 18px; line-height: 1.2; }
      .mobile-caption p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.55; }
      .mobile-result { margin-top: 14px; padding-top: 13px; border-top: 1px solid var(--line); }
      .mobile-result b { display: block; margin-bottom: 5px; color: var(--green); font-size: 10px; text-transform: uppercase; }
      .mobile-result p { color: #454851; }
    }

    @media (max-width: 900px) and (orientation: landscape) {
      .deck {
        display: grid;
        place-items: center;
        width: 100vw;
        height: 100dvh;
        min-height: 0;
        padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
        overflow: hidden;
      }
      .stage-wrap {
        width: min(calc(100vw - 20px), calc((100dvh - 20px) * 16 / 9));
        margin-top: 0;
        aspect-ratio: 16 / 9;
        border: 1px solid rgba(23, 24, 28, .12);
        border-radius: 10px;
        overflow: hidden;
      }
      .sales-mode { place-items: start center; }
      .sales-mode .stage-wrap {
        width: min(calc(100vw - 20px), calc((100dvh - 72px) * 1280 / 590));
        margin-top: 10px;
        aspect-ratio: 1280 / 590;
        overflow: visible;
      }
      .chapter, .hint { display: none; }
      .deck-controls {
        bottom: 7px;
        gap: 5px;
        transform: translateX(-50%) scale(.82);
        transform-origin: bottom center;
      }
      .sales-mode .deck-controls { bottom: -49px; }
      .mobile-caption { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <main class="deck sales-mode" id="deck" aria-live="polite">
    <div class="stage-wrap">
      <div class="stage" id="stage"></div>
      <div class="chapter" id="chapter"><span>01</span><b>Начало</b></div>
      <div class="hint">← → навигация · Space автопоказ · O обзор</div>
      <div class="deck-controls" aria-label="Управление презентацией">
        <button class="control" id="prev" type="button" title="Предыдущий экран" aria-label="Предыдущий экран">←</button>
        <button class="control" id="modeToggle" type="button" title="Переключить режим презентации">Sales</button>
        <button class="control counter" id="counter" type="button" title="Открыть обзор">1 / 15</button>
        <button class="control primary" id="play" type="button" title="Автопоказ" aria-label="Запустить автопоказ">▶</button>
        <button class="control" id="next" type="button" title="Следующий экран" aria-label="Следующий экран">→</button>
        <button class="control" id="clean" type="button" title="Чистый режим" aria-label="Переключить чистый режим">⌗</button>
      </div>
      <div class="timeline"><span id="timeline"></span></div>
      <section class="overview" id="overview" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Обзор экранов">
        <div class="overview-head">
          <div><div class="muted small">Kamilya LMS</div><h2>Все этапы демонстрации</h2></div>
          <button class="control" id="closeOverview" type="button">Закрыть</button>
        </div>
        <div class="overview-grid" id="overviewGrid"></div>
      </section>
    </div>
    <section class="mobile-caption" id="mobileCaption" aria-label="Описание текущего этапа"></section>
  </main>

  <script>
    const navSections = {
      content: [
        ['▣', 'AI Генерация', 'ai'], ['▤', 'Курсы', 'courses'], ['✓', 'Конструктор тестов', 'quizzes'], ['□', 'Документы', 'documents']
      ],
      management: [
        ['⌗', 'Штатное расписание', 'staff'], ['▥', 'Должности', 'positions'], ['＋', 'Назначения курсов', 'assignments']
      ],
      control: [
        ['◎', 'Журнал обучения', 'log']
      ]
    };

    function sidebar(active, role = 'Методолог') {
      const groups = [
        ['Контент', navSections.content],
        ['Управление курсами', navSections.management],
        ['Контроль', navSections.control]
      ];
      return `
        <aside class="sidebar">
          <div class="brand"><div class="brand-mark">K</div><div><div class="brand-word"><b>Kamilya</b><span>LMS</span></div><small>AI-ПЛАТФОРМА</small></div></div>
          <div class="side-scroll">
            ${groups.map(([title, items]) => `<div class="side-label">${title}</div>${items.map(([icon,label,key]) => `<div class="nav-item ${active === key ? 'active' : ''}"><span class="ico">${icon}</span><span>${label}</span></div>`).join('')}`).join('')}
          </div>
          <div class="person"><div class="avatar">АМ</div><div><b>Айдана Мусина</b><small>${role}</small></div></div>
        </aside>`;
    }

    function topbar(role = 'Методолог') {
      return `<header class="topbar"><div class="tenant">Кабинет: <b>ТОО «Orda Logistics»</b></div><div class="top-actions"><div class="top-pill">RU⌄</div><div class="top-pill">Поиск…</div><div class="top-avatar">АМ</div></div></header>`;
    }

    function appScreen(active, body, role = 'Методолог', compact = false) {
      return `<div class="app-shell">${sidebar(active, role)}<section class="app-main">${topbar(role)}<div class="content ${compact ? 'compact' : ''}">${body}</div></section></div>`;
    }

    function callout(step, title, text, result, position = 'bottom-right') {
      return `<aside class="callout ${position}"><div class="eyebrow">Этап ${step}</div><h2>${title}</h2><p>${text}</p><div class="benefit">${result}</div></aside>`;
    }

    function focus(style) { return `<div class="focus-ring" style="${style}"></div>`; }

    function salesFrame(visual, step, chapter, title, text, result) {
      return `<section class="sales-frame"><div class="sales-visual">${visual}</div><footer class="sales-narrative"><div class="sales-step">Этап ${step}<b>${chapter}</b></div><div class="sales-message"><h2>${title}</h2><p>${text}</p></div><div class="sales-result"><span>Практический результат</span><p>${result}</p></div></footer></section>`;
    }

    const fullScenes = [
      {
        chapter: 'Начало', title: 'От документа до результата', duration: 6500,
        html: `<section class="intro">
          <div><div class="intro-brand"><div class="brand-mark">K</div><div class="brand-word"><b>Kamilya</b><span>LMS</span></div></div><h1>Как методолог превращает <span>документ компании</span> в подтвержденное обучение</h1><p class="lead">Один последовательный сценарий: подготовить содержание, проверить его, назначить сотрудникам и увидеть фактический результат.</p></div>
          <div class="story-map"><h2>Рабочий путь за одну демонстрацию</h2>
            <div class="story-step"><span>1</span><div><b>Источник</b><small>Инструкция или внутренний регламент</small></div></div>
            <div class="story-step"><span>2</span><div><b>Подготовка</b><small>AI-черновик, редактура и тест</small></div></div>
            <div class="story-step"><span>3</span><div><b>Доставка</b><small>Публикация и назначение аудитории</small></div></div>
            <div class="story-step"><span>4</span><div><b>Подтверждение</b><small>Прохождение, сертификат и журнал</small></div></div>
          </div>
        </section>`
      },
      {
        chapter: 'Контекст', title: 'Кабинет методолога', duration: 6000,
        html: appScreen('ai', `

        chapter: 'Пилот', title: 'Проверяем на одном процессе компании', duration: 9500,
        html: salesFrame(`
          <div class="pilot-screen"><div class="sales-kicker">Следующий шаг · 14-дневный пилот</div><h1>Возьмём один документ и проверим весь цикл на вашей команде</h1><p class="lead">Без обещаний абстрактной экономии. Результат пилота оценивается по конкретным действиям внутри вашей компании.</p><div class="pilot-grid"><article class="pilot-step"><span>01</span><b>Загрузить один действующий документ</b></article><article class="pilot-step"><span>02</span><b>Проверить первый курс и тест</b></article><article class="pilot-step"><span>03</span><b>Назначить группе из 3–10 сотрудников</b></article><article class="pilot-step"><span>04</span><b>Получить первое завершение в журнале</b></article></div><div class="pilot-cta">Запустить контролируемый пилот</div></div>`, '8 из 8', 'Пилот', 'Ценность проверяется на реальном документе клиента', 'Пилот проходит на небольшой группе и имеет заранее понятные критерии успеха.', 'Компания принимает решение по наблюдаемому результату собственного процесса, а не по обещанным процентам.')
      }
    ];

    const stage = document.getElementById('stage');
    const counter = document.getElementById('counter');
    const timeline = document.getElementById('timeline');
    const chapter = document.getElementById('chapter');
    const playButton = document.getElementById('play');
    const deck = document.getElementById('deck');
    const overview = document.getElementById('overview');
    const overviewGrid = document.getElementById('overviewGrid');
    const mobileCaption = document.getElementById('mobileCaption');
    const modeToggle = document.getElementById('modeToggle');
    const closeOverview = document.getElementById('closeOverview');
    const deckControls = document.querySelector('.deck-controls');
    const params = new URLSearchParams(location.search);
    let mode = params.get('mode') === 'full' ? 'full' : 'sales';
    let scenes = mode === 'full' ? fullScenes : salesScenes;
    let current = 0;
    let timer = null;
    let playing = false;
    let overviewReturnFocus = null;

    function renderDeck() {
      stage.innerHTML = '';
      overviewGrid.innerHTML = '';
      deck.classList.toggle('sales-mode', mode === 'sales');
      deck.classList.toggle('full-mode', mode === 'full');

      scenes.forEach((scene, index) => {
        const section = document.createElement('section');
        section.className = `scene${index === current ? ' active' : ''}`;
        section.dataset.index = String(index);
        section.setAttribute('aria-label', `${index + 1}. ${scene.title}`);
        section.innerHTML = `<div class="scene-frame">${scene.html}</div>`;
        stage.appendChild(section);

        const card = document.createElement('button');
        card.type = 'button';
        card.className = `overview-card${index === current ? ' active' : ''}`;
        card.innerHTML = `<span>${String(index + 1).padStart(2,'0')} · ${scene.chapter}</span><b>${scene.title}</b>`;
        card.addEventListener('click', () => { show(index); toggleOverview(false); });
        overviewGrid.appendChild(card);
      });

      modeToggle.textContent = mode === 'sales' ? 'Sales' : 'Full';
      modeToggle.setAttribute('aria-label', mode === 'sales' ? 'Переключить на полный walkthrough' : 'Переключить на короткую презентацию');
      modeToggle.title = mode === 'sales' ? 'Открыть полный walkthrough' : 'Открыть короткую презентацию';
      updateUi();
    }

    function syncUrl() {
      const url = new URL(location.href);
      url.searchParams.set('mode', mode);
      url.searchParams.set('slide', String(current + 1));
      history.replaceState(null, '', url);
    }

    function setMode(nextMode) {
      if (nextMode === mode) return;
      stop();
      mode = nextMode;
      scenes = mode === 'full' ? fullScenes : salesScenes;
      current = 0;
      renderDeck();
      syncUrl();
    }

    function show(index) {
      const nextIndex = Math.max(0, Math.min(scenes.length - 1, index));
      if (nextIndex === current) { updateUi(); syncUrl(); return; }
      const oldScene = stage.querySelector(`.scene[data-index="${current}"]`);
      const newScene = stage.querySelector(`.scene[data-index="${nextIndex}"]`);
      const forward = nextIndex > current;
      oldScene?.classList.remove('active');
      oldScene?.classList.toggle('leaving', forward);
      newScene?.classList.remove('leaving');
      if (!forward && newScene) newScene.style.transform = 'translateX(-22px) scale(.995)';
      requestAnimationFrame(() => {
        newScene?.classList.add('active');
        if (newScene) newScene.style.transform = '';
      });
      current = nextIndex;
      updateUi();
      syncUrl();
      if (playing) schedule();
    }

    function updateUi() {
      counter.textContent = `${current + 1} / ${scenes.length}`;
      timeline.style.width = `${((current + 1) / scenes.length) * 100}%`;
      chapter.innerHTML = `<span>${String(current + 1).padStart(2,'0')}</span><b>${scenes[current].chapter}</b>`;
      document.querySelectorAll('.overview-card').forEach((card, index) => card.classList.toggle('active', index === current));
      document.getElementById('prev').disabled = current === 0;
      document.getElementById('next').disabled = current === scenes.length - 1;
      const activeScene = stage.querySelector(`.scene[data-index="${current}"]`);
      const activeCallout = activeScene.querySelector('.callout');
      const activeNarrative = activeScene.querySelector('.sales-narrative');
      const captionTitle = activeCallout?.querySelector('h2')?.textContent || activeNarrative?.querySelector('h2')?.textContent || activeScene.querySelector('h1')?.textContent || scenes[current].title;
      const captionText = activeCallout?.querySelector('p')?.textContent || activeNarrative?.querySelector('.sales-message p')?.textContent || activeScene.querySelector('.lead')?.textContent || '';
      const captionResult = activeNarrative?.querySelector('.sales-result p')?.textContent || activeCallout?.querySelector('.benefit p')?.textContent || '';
      mobileCaption.innerHTML = `<span>${String(current + 1).padStart(2,'0')} · ${scenes[current].chapter}</span><h2>${captionTitle}</h2><p>${captionText}</p>${captionResult ? `<div class="mobile-result"><b>Практический результат</b><p>${captionResult}</p></div>` : ''}`;
    }

    function next() {
      if (current >= scenes.length - 1) { stop(); return; }
      show(current + 1);
    }

    function previous() { show(current - 1); }

    function schedule() {
      clearTimeout(timer);
      timer = setTimeout(next, scenes[current].duration);
    }

    function play() {
      playing = !playing;
      playButton.textContent = playing ? 'Ⅱ' : '▶';
      playButton.setAttribute('aria-label', playing ? 'Остановить автопоказ' : 'Запустить автопоказ');
      if (playing) schedule(); else clearTimeout(timer);
    }

    function stop() { playing = false; clearTimeout(timer); playButton.textContent = '▶'; }

    function toggleOverview(force) {
      const open = typeof force === 'boolean' ? force : !overview.classList.contains('open');
      if (open === overview.classList.contains('open')) return;
      overview.classList.toggle('open', open);
      overview.setAttribute('aria-hidden', String(!open));
      stage.inert = open;
      deckControls.inert = open;
      if (open) {
        overviewReturnFocus = document.activeElement;
        stop();
        closeOverview.focus();
      } else {
        overviewReturnFocus?.focus();
        overviewReturnFocus = null;
      }
    }

    document.getElementById('next').addEventListener('click', next);
    document.getElementById('prev').addEventListener('click', previous);
    document.getElementById('play').addEventListener('click', play);
    document.getElementById('clean').addEventListener('click', () => deck.classList.toggle('clean'));
    document.getElementById('counter').addEventListener('click', () => toggleOverview());
    closeOverview.addEventListener('click', () => toggleOverview(false));
    modeToggle.addEventListener('click', () => setMode(mode === 'sales' ? 'full' : 'sales'));

    document.addEventListener('keydown', (event) => {
      if (overview.classList.contains('open') && event.key !== 'Escape') return;
      if (event.key === 'ArrowRight' || event.key === 'PageDown') next();
      if (event.key === 'ArrowLeft' || event.key === 'PageUp') previous();
      if (event.key === ' ') { event.preventDefault(); play(); }
      if (event.key.toLowerCase() === 'o') toggleOverview();
      if (event.key.toLowerCase() === 'c') deck.classList.toggle('clean');
      if (event.key.toLowerCase() === 'm') setMode(mode === 'sales' ? 'full' : 'sales');
      if (event.key === 'Home') show(0);
      if (event.key === 'End') show(scenes.length - 1);
      if (event.key === 'Escape') toggleOverview(false);
    });

    let touchStart = null;
    stage.addEventListener('touchstart', event => { touchStart = event.changedTouches[0].clientX; }, { passive: true });
    stage.addEventListener('touchend', event => {
      if (touchStart === null) return;
      const delta = event.changedTouches[0].clientX - touchStart;
      if (Math.abs(delta) > 45) delta < 0 ? next() : previous();
      touchStart = null;
    }, { passive: true });

    renderDeck();
    const start = Number(params.get('slide'));
    if (Number.isFinite(start) && start > 0) show(Math.min(scenes.length, start) - 1);
    else syncUrl();
    if (params.get('clean') === '1' || params.get('record') === '1') deck.classList.add('clean');
    if (params.get('record') === '1') deck.classList.add('recording');
    if (params.get('autoplay') === '1' || params.get('record') === '1') { playing = true; playButton.textContent = 'Ⅱ'; schedule(); }
    const stageWrap = document.querySelector('.stage-wrap');
    const syncSceneScale = () => stageWrap.style.setProperty('--scene-scale', String(stageWrap.clientWidth / 1280));
    new ResizeObserver(syncSceneScale).observe(stageWrap);
    syncSceneScale();
  </script>
</body>
</html>
